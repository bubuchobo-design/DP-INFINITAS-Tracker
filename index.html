<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DP INFINITAS Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css?v=2.0.0" />
</head>
<body>
  <header class="hero">
    <div>
      <h1>DP INFINITAS</h1>
      <p class="sub">Tracker / Road to DP Kaiden</p>
    </div>
    <div class="version">v2.0</div>
  </header>

  <main>
    <section class="view home-view active" data-view="home">
      <section class="card summary-card">
        <div class="summary-top">
          <div>
            <p class="label">全体進捗</p>
            <h2 id="clearPercent">0%</h2>
            <p class="meta" id="clearSummary">0 / 0</p>
          </div>
          <div class="ring"><span id="ringNum">0</span><small id="ringDen">/0</small></div>
        </div>
        <div class="bar"><div id="clearBar"></div></div>
        <div class="mini-stats">
          <div><span id="easyCount">0</span><small>EASY+</small></div>
          <div><span id="hardCount">0</span><small>HARD+</small></div>
          <div><span id="exhCount">0</span><small>EXH+</small></div>
          <div><span id="fcCount">0</span><small>FC</small></div>
        </div>
      </section>
      <section class="card stats-card">
        <div class="section-title"><h3>難易度別</h3></div>
        <div id="diffStatsHome" class="diff-cards"></div>
      </section>
    </section>

    <section class="view list-view" data-view="list">
      <section class="card controls compact-controls">
        <div class="seg star-tabs" id="officialTabs">
          <button data-official="" class="active">全て</button>
          <button data-official="10">☆10</button>
          <button data-official="11">☆11</button>
          <button data-official="12">☆12</button>
        </div>
        <div class="seg sort-tabs" id="sortTabs">
          <button data-sort="difficulty" class="active">非公式順</button>
          <button data-sort="title">A-Z</button>
          <button data-sort="version">シリーズ</button>
        </div>
        <select id="diffFilter"><option value="">難易度 全て</option></select>
        <div class="countline"><span id="resultCount">0</span> 譜面</div>
      </section>
      <section class="track-list" id="trackList"></section>
    </section>

    <section class="view today-view" data-view="today">
      <section class="card today-card">
        <div class="section-title"><h3>今日の候補</h3><button id="rerollBtn">再抽選</button></div>
        <p class="meta">未HARDから☆10・☆11・☆12をそれぞれ候補表示します。</p>
        <div id="todayList" class="today-list"></div>
      </section>
    </section>

    <section class="view stats-view" data-view="stats">
      <section class="card stats-card">
        <h3>統計</h3>
        <div id="diffStats" class="diff-stats"></div>
      </section>
    </section>

    <section class="view tools-view" data-view="tools">
      <section class="card tools-card">
        <h3>ツール</h3>
        <label class="toggle-row"><span>下部タブ表示</span><input id="tabToggle" type="checkbox" checked /></label>
        <p class="meta">OFFにすると全画面を縦に並べて表示します。</p>
        <div class="tool-buttons">
          <button id="exportBtn">バックアップ</button>
          <label class="importBtn">復元<input id="importInput" type="file" accept="application/json" hidden /></label>
        </div>
      </section>
    </section>
  </main>

  <nav class="bottom-tabs" id="bottomTabs">
    <button data-tab="home" class="active">ホーム</button>
    <button data-tab="list">曲</button>
    <button data-tab="stats">統計</button>
    <button data-tab="tools">ツール</button>
  </nav>

  <dialog id="editDialog">
    <form method="dialog" id="editForm">
      <div class="dialog-head">
        <div>
          <p id="editMeta" class="eyebrow"></p>
          <h3 id="editTitle"></h3>
        </div>
        <button value="cancel" class="icon-btn">×</button>
      </div>
      <div class="lamp-choice" id="lampChoice"></div>
      <label class="check"><input id="editFav" type="checkbox" /> お気に入り</label>
      <label>優先度<select id="editPriority"><option value="">なし</option><option>★★★</option><option>★★</option><option>★</option></select></label>
      <label>メモ<textarea id="editMemo" placeholder="例：右鏡、FLIP、終盤注意"></textarea></label>
      <button id="saveEdit" value="default" class="primary">保存</button>
    </form>
  </dialog>

  <script src="app.js?v=2.0.0"></script>
</body>
</html>
